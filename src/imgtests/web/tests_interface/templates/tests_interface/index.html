{% extends 'tests_interface/base.html' %}
{% load i18n %}

{% block title %}{% trans "Home" %} - {% trans "Test Dashboard" %}{% endblock %}

{% block content %}
<div class="card">
    <div class="title-container">
        <h1>{% trans "Test Platform Dashboard" %}</h1>
        <p class="subtitle">
            {% trans "Select a platform to view test results and reports" %}
        </p>
    </div>

    <div class="controls">
        <button id="addDistroBtn" class="btn btn-success">
            + {% trans "Add Distribution" %}
        </button>
        <button id="resetDistrosBtn" class="btn btn-warning">
            {% trans "Reset to Default" %}
        </button>
    </div>

    <div id="distrosContainer" class="links-container"></div>
</div>

{% load static %}
<script src="{% static 'js/dashboard.js' %}"></script>
{% endblock %}
