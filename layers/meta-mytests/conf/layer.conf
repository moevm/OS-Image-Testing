BBPATH .= ":${LAYERDIR}"

BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "mytests"

BBFILE_PATTERN_mytests = "^${LAYERDIR}/"

BBFILE_PRIORITY_mytests = "6"

LAYERVERSION_mytests = "1"

LAYERSERIES_COMPAT_mytests = "styhead kirkstone warrior zeus"

