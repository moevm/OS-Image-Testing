services:
  imgtests-yocto:
    build:
      context: .
      dockerfile: docker/image_builder.dockerfile
      args:
        USER: ${USER}
        GROUP: ${GROUP}
        PASSWORD: ${PASSWORD}
        POKY_DIR: ${POKY_DIR}
    user: ${USER}:${GROUP}
    image: ${DOCKER_TAG}
    command: ${POKY_DIR}/cmd_yocto.sh
    volumes:
      - ${DOCKER_BUILD_VOLUME}:${BUILD_DIR}
      - ${DOCKER_DOWNLOADS_VOLUME}:${POKY_DIR}/downloads
      - ${DOCKER_SSTATE_VOLUME}:${POKY_DIR}/sstate-cache
      - ${HOST_CONF_PATH}/local.conf:${BUILD_DIR}/conf/local.conf
      - ${HOST_CONF_PATH}/packages.conf:${BUILD_DIR}/conf/packages.conf
      - ${HOST_LAYERS_PATH}/meta-image-tests:${POKY_DIR}/meta-image-tests
      - ${HOST_SCRIPTS_PATH}/add-layers.sh:${POKY_DIR}/add-layers.sh
    environment:
      BUILD_DIR: ${BUILD_DIR}
      POKY_DIR: ${POKY_DIR}
      OS_IMAGE: ${OS_IMAGE}
      USER: ${USER}
      GROUP: ${GROUP}
    ports:
      - ${SSH_QEMU_PORT}:${SSH_QEMU_PORT}
    networks:
      yocto-network:
        ipv4_address: ${YOCTO_ADDRESS}

  imgtests-analyzer:
    build:
      context: .
      dockerfile: docker/python.dockerfile
      args:
        USER: ${USER}
        GROUP: ${GROUP}
    image: ${DOCKER_PYTHON_TAG}
    command: python3 /home/${USER}/image/runner.py
    volumes:
      - ./tests/image:/home/${USER}/image
    environment:
      PYTHONPATH: /home/${USER}/
      SSH_USER: ${SSH_QEMU_USER}
      SSH_PASS: ""
      SSH_ADDR: ${YOCTO_ADDRESS}
      SSH_PORT: ${SSH_QEMU_PORT}
    networks:
      yocto-network:
        ipv4_address: ${PYTHON_ADDRESS}

  bencher_api_compose:
    image: ghcr.io/bencherdev/bencher-api:latest
    container_name: bencher_api
    ports:
      - ${BENCHER_API_PORT}:${BENCHER_API_PORT}
    volumes:
      - ${BENCHER_API_CONF_VOL}:/etc/bencher
      - ${BENCHER_API_DB_VOL}:/var/lib/bencher/data
    networks:
      yocto-network:
        ipv4_address: ${BENCHER_API_ADDRESS}
  
  bencher_console_compose:
    image: ghcr.io/bencherdev/bencher-console:latest
    container_name: bencher_console
    ports:
      - ${BENCHER_CLI_PORT}:${BENCHER_CLI_PORT}
    environment:
      - BENCHER_API_URL=${BENCHER_API_ADDRESS}:${BENCHER_API_PORT}
      - INTERNAL_API_URL=${BENCHER_API_ADDRESS}:${BENCHER_API_PORT}
    depends_on:
      - bencher_api_compose
    networks:
      yocto-network:
        ipv4_address: ${BENCHER_CLI_ADDRESS}

volumes:
  imgtests-yocto-build:
    external: true
  imgtests-yocto-downloads:
    external: true
  imgtests-yocto-sstate:
    external: true
  imgtests-bencher-conf:
    external: true
  imgtests-bencher-database:
    external: true

networks:
  yocto-network:
    driver: bridge
    ipam:
      config:
        - subnet: ${SUBNET}
          gateway: ${GATEWAY}
