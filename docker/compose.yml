services:
  imgtests-yocto:
    build:
      dockerfile: docker/image_builder.dockerfile
      args:
        USER: ${USER}
        GROUP: ${GROUP}
        PASSWORD: ${PASSWORD}
        POKY_DIR: ${POKY_DIR}
    user: ${USER}:${GROUP}
    image: ${DOCKER_TAG}
    command: ${POKY_DIR}/cmd_yocto.sh
    volumes:
      - ${DOCKER_BUILD_VOLUME}:${BUILD_DIR}
      - ${DOCKER_DOWNLOADS_VOLUME}:${POKY_DIR}/downloads
      - ${DOCKER_SSTATE_VOLUME}:${POKY_DIR}/sstate-cache
      - ${HOST_CONF_PATH}/local.conf:${BUILD_DIR}/conf/local.conf
      - ${HOST_CONF_PATH}/packages.conf:${BUILD_DIR}/conf/packages.conf
      - ${HOST_LAYERS_PATH}/meta-image-tests:${POKY_DIR}/meta-image-tests
      - ${HOST_SCRIPTS_PATH}/add-layers.sh:${POKY_DIR}/add-layers.sh
    environment:
      BUILD_DIR: ${BUILD_DIR}
      POKY_DIR: ${POKY_DIR}
      OS_IMAGE: ${OS_IMAGE}
      USER: ${USER}
      GROUP: ${GROUP}
    ports:
      - ${SSH_QEMU_PORT}:${SSH_QEMU_PORT}
    networks:
      yocto-network:
        ipv4_address: ${YOCTO_ADDRESS}

  imgtests-suse-155:
    build:
      dockerfile: docker/open-suse.dockerfile
      args:
        USER: ${USER}
    image: ${DOCKER_SUSE_TAG}-155
    command: ${SUSE_DIR}/scripts/suse-compose.sh 15.5
    volumes:
      - ${DOCKER_OPENSUSE_VOLUME}:${SUSE_DIR}
      - ${HOST_SCRIPTS_PATH}/opensuse/:${SUSE_DIR}/scripts
    environment:
      S_USER: ${S_USER}
      PASSWORD: ${PASSWORD}
      SSH_SUSE_PORT: ${SSH_SUSE_PORT_5}
    ports:
      - ${SSH_SUSE_PORT_5}:${SSH_SUSE_PORT_5}
    networks:
      yocto-network:
        ipv4_address: ${SUSE_ADDRESS_5}

  imgtests-suse-156:
    build:
      dockerfile: docker/open-suse.dockerfile
      args:
        USER: ${USER}
    image: ${DOCKER_SUSE_TAG}-156
    command: ${SUSE_DIR}/scripts/suse-compose.sh 15.6
    volumes:
      - ${DOCKER_OPENSUSE_VOLUME}:${SUSE_DIR}
      - ${HOST_SCRIPTS_PATH}/opensuse:${SUSE_DIR}/scripts
    environment:
      S_USER: ${S_USER}
      PASSWORD: ${PASSWORD}
      SSH_SUSE_PORT: ${SSH_SUSE_PORT_6}
    ports:
      - ${SSH_SUSE_PORT_6}:${SSH_SUSE_PORT_6}
    networks:
      yocto-network:
        ipv4_address: ${SUSE_ADDRESS_6}

  imgtests-analyzer:
    build:
      dockerfile: docker/python.dockerfile
      args:
        USER: ${USER}
        GROUP: ${GROUP}
    image: ${DOCKER_PYTHON_TAG}
    command: python3 /home/${USER}/image/runner.py
    volumes:
      - ./tests/image:/home/${USER}/image
    environment:
      PYTHONPATH: /home/${USER}/
      SSH_USER: ${SSH_QEMU_USER}
      SSH_PASS: ""
      SSH_ADDR: ${YOCTO_ADDRESS}
      SSH_PORT: ${SSH_QEMU_PORT}
    networks:
      yocto-network:
        ipv4_address: ${PYTHON_ADDRESS}

volumes:
  imgtests-yocto-build:
    external: true
  imgtests-yocto-downloads:
    external: true
  imgtests-yocto-sstate:
    external: true
  imgtests-open-suse-files:
    external: true

networks:
  yocto-network:
    driver: bridge
    ipam:
      config:
        - subnet: ${SUBNET}
          gateway: ${GATEWAY}
