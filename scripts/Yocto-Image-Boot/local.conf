MACHINE ??= "qemux86-64"

DL_DIR ?= "/home/user/poky/downloads"

SSTATE_DIR ?= "/home/user/poky/sstate-cache${TOPDIR}/sstate-cache"

DISTRO ?= "poky"

PACKAGE_CLASSES ?= "package_rpm"

EXTRA_IMAGE_FEATURES ?= "debug-tweaks"

USER_CLASSES ?= "buildstats"

PATCHRESOLVE = "noop"

BB_DISKMON_DIRS ??= "\
    STOPTASKS,${TMPDIR},1G,100K \
    STOPTASKS,${DL_DIR},1G,100K \
    STOPTASKS,${SSTATE_DIR},1G,100K \
    STOPTASKS,/tmp,100M,100K \
    HALT,${TMPDIR},100M,1K \
    HALT,${DL_DIR},100M,1K \
    HALT,${SSTATE_DIR},100M,1K \
    HALT,/tmp,10M,1K"

PACKAGECONFIG:append:pn-qemu-system-native = " sdl"

CONF_VERSION = "2"

DISTRO_FEATURES:append = " ptest"

IMAGE_INSTALL:append = " glibc stress-ng stress-ng-ptest"

EXTRA_IMAGE_FEATURES += "ptest-pkgs"

PTEST_ENABLED = "1"

BB_NUMBER_THREADS = "5"

PARALLEL_MAKE = "-j 5"
